---
- name: Start Seerr
  when: seerr_enabled
  block:
    - name: Check for Seerr Breaking Changes
      ansible.builtin.include_role:
        name: breaking_changes
      vars:
        breaking_changes_application: seerr

    - name: Create Seerr Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ seerr_data_directory }}"

    - name: Seerr Docker Container
      community.docker.docker_container:
        name: "{{ seerr_container_name }}"
        image: "{{ seerr_image_name }}:{{ seerr_image_version }}"
        pull: true
        volumes:
          - "{{ seerr_data_directory }}:/app/config:rw"
        ports:
          - "{{ seerr_port }}:5055"
        env:
          TZ: "{{ computer_timezone }}"
          LOG_LEVEL: "{{ seerr_log_level }}"
        healthcheck:
          test:
            [
              "wget",
              "--no-verbose",
              "--tries=1",
              "--spider",
              "http://localhost:5055/api/v1/settings/public",
              "||",
              "exit 1",
            ]
          start_period: 20s
          timeout: 3s
          interval: 15s
          retries: 3
        restart_policy: unless-stopped
        memory: "{{ seerr_memory }}"
        labels:
          traefik.enable: "{{ (seerr_dns_accessible or seerr_available_externally) | string }}"
          traefik.http.services.seerr.loadbalancer.server.port: "5055"
          traefik.http.routers.seerr.rule: "Host(`{{ seerr_hostname ~ '.' if
            seerr_hostname else '' }}{{ dns_domain }}`)"
          traefik.http.routers.seerr.tls.domains[0].main: "{{ dns_domain }}"
          traefik.http.routers.seerr.tls.domains[0].sans: "*.{{ dns_domain }}"
          traefik.http.routers.seerr.tls.certresolver: "letsencrypt"
          traefik.http.routers.seerr.middlewares: "{{ omit if seerr_available_externally else 'blockExternal@file' }}"

- name: Stop Seerr
  when: not seerr_enabled
  block:
    - name: Stop Seerr
      community.docker.docker_container:
        name: "{{ seerr_container_name }}"
        state: absent
