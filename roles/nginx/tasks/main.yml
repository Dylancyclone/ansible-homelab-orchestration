---
- name: Start Nginx
  when: nginx_enabled
  block:
    - name: Check for Nginx Breaking Changes
      ansible.builtin.include_role:
        name: breaking_changes
      vars:
        breaking_changes_application: nginx

    - name: Create Nginx Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ nginx_data_directory }}"

    - name: Nginx Docker Container
      community.docker.docker_container:
        name: "{{ nginx_container_name }}"
        image: "{{ nginx_image_name }}:{{ nginx_image_version }}"
        pull: true
        volumes:
          - "{{ nginx_data_directory }}:/usr/share/nginx/html:rw"
        ports:
          - "{{ nginx_port }}:80"
        restart_policy: unless-stopped
        memory: "{{ nginx_memory }}"
        labels:
          traefik.enable: "{{ (nginx_dns_accessible or nginx_available_externally) | string }}"
          traefik.http.services.nginx.loadbalancer.server.port: "80"
          traefik.http.routers.nginx.rule: "Host(`{{ nginx_hostname ~ '.' if nginx_hostname else ''}}{{ dns_domain }}`)"
          traefik.http.routers.nginx.tls.domains[0].main: "{{ dns_domain }}"
          traefik.http.routers.nginx.tls.domains[0].sans: "*.{{ dns_domain }}"
          traefik.http.routers.nginx.tls.certresolver: "letsencrypt"
          traefik.http.routers.nginx.middlewares: "{{ omit if nginx_available_externally else 'blockExternal@file' }}"

- name: Stop Nginx
  when: not nginx_enabled
  block:
    - name: Stop Nginx
      community.docker.docker_container:
        name: "{{ nginx_container_name }}"
        state: absent
