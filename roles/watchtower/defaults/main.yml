---
watchtower_enabled: false

# Sets the 6 field cron schedule to use for checks and updates. This will check at 5am daily.
watchtower_cron_schedule: 0 0 5 * * *

# Sets the Watchtower Docker start command. Different options can be supplied based on whether you want to receive
# notifications or not, some examples are provided below. See https://containrrr.dev/watchtower/arguments/ for more options.

# No notifications
watchtower_command: "--schedule '{{ watchtower_cron_schedule }}' --cleanup"

# Email notifications
# watchtower_command: "--schedule '{{ watchtower_cron_schedule }}' --cleanup --notifications 'email'\
#   --notification-email-from 'me@example.com' --notification-email-to 'me@example.com' --notification-email-server 'my.email.server.com'\
#   --notification-email-server-port '25' --notification-email-server-user 'email_username' --notification-email-server-password 'top-secret'"

# Slack notifications
# watchtower_command: "--schedule '{{ watchtower_cron_schedule }}' --cleanup --notifications 'slack'\
#   --notification-slack-hook-url 'https://hooks.slack.com/services/xxx/yyyyyyyyyyyyyyy' --notification-slack-identifier 'ansible-homelab-orchestration'"

# containers
watchtower_container_name: watchtower
watchtower_image_name: nickfedor/watchtower
watchtower_image_version: latest

watchtower_container_names: # Used to check if app is running
  - "{{ watchtower_container_name }}"

# specs
watchtower_memory: 1g

# --- Prometheus metrics ---
# Expose Watchtower's HTTP metrics endpoint (/v1/metrics on container port 8080).
# Watchtower's HTTP API requires a token, so this is always authenticated.
watchtower_metrics_enabled: false
# Host port to publish the metrics endpoint on (container's internal API port is always 8080).
watchtower_metrics_port: 8081
# Bearer token required to scrape the endpoint. Set this in your inventory (keep it secret).
watchtower_metrics_token: ""

# Publishing a port normally makes Watchtower skip updating its OWN container (to avoid a
# host-port conflict on recreation). Enabling this uses the fork's ephemeral self-update
# orchestrator (v1.16.0+, experimental) so Watchtower keeps self-updating even with a port
# mapped. Recommended when watchtower_metrics_enabled is true on a set-and-forget host.
watchtower_ephemeral_self_update_enabled: false
