---
- name: Start Borg UI
  when: borg_ui_enabled
  block:
    - name: Check for Borg UI Breaking Changes
      ansible.builtin.include_role:
        name: breaking_changes
      vars:
        breaking_changes_application: borg_ui

    - name: Create Borg UI Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ borg_ui_data_directory }}"
        - "{{ borg_ui_cache_directory }}"

    - name: Create Borg UI network
      community.docker.docker_network:
        name: "{{ borg_ui_network_name }}"

    - name: Borg UI Redis Docker Container
      community.docker.docker_container:
        name: "{{ borg_ui_container_name }}"
        image: "{{ borg_ui_image_name }}:{{ borg_ui_image_version }}"
        pull: true
        networks:
          - name: "{{ borg_ui_network_name }}"
        command: ["redis-server", "--maxmemory", "2gb", "--maxmemory-policy", "allkeys-lru"]
        healthcheck:
          test: ["CMD", "redis-cli", "ping"]
          interval: 10s
          timeout: 3s
          retries: 3
        restart_policy: unless-stopped
        memory: "{{ borg_ui_redis_memory }}"

    - name: Borg UI Docker Container
      vars:
        borg_ui_volumes:
          - "{{ borg_ui_data_directory }}:/data:rw"
          - "{{ borg_ui_cache_directory }}:/home/borg/.cache/borg:rw"
          - "{{ data_home }}:/local/data:{{ duplicati_data_permissions }}"
          - "{{ docker_home }}:/local/docker:{{ duplicati_data_permissions }}"
          - "{{ omit if borg_ui_allow_docker_access else '/var/run/docker.sock:/var/run/docker.sock:rw' }}"
          # - "{{ borg_ui_tmp_directory }}:/tmp:rw"
        borg_ui_volumes_with_extras: "{{ borg_ui_volumes + borg_ui_extra_volumes | default([]) }}"
      community.docker.docker_container:
        name: "{{ borg_ui_container_name }}"
        image: "{{ borg_ui_image_name }}:{{ borg_ui_image_version }}"
        pull: true
        volumes: "{{ borg_ui_volumes_with_extras }}"
        ports:
          - "{{ borg_ui_port }}:8081"
        env:
          TZ: "{{ computer_timezone }}"
          PUID: "{{ borg_ui_user_id }}"
          PGID: "{{ borg_ui_group_id }}"
          REDIS_HOST: "{{ borg_ui_redis_container_name }}"
          REDIS_PORT: "6379"
        networks:
          - name: "{{ borg_ui_network_name }}"
        restart_policy: unless-stopped
        memory: "{{ borg_ui_memory }}"
        labels:
          traefik.enable: "{{ (borg_ui_dns_accessible or borg_ui_available_externally) | string }}"
          traefik.http.services.borg_ui.loadbalancer.server.port: "8081"
          traefik.http.routers.borg_ui.rule: "Host(`{{ borg_ui_hostname ~ '.' if borg_ui_hostname else '' }}{{ dns_domain }}`)"
          traefik.http.routers.borg_ui.tls.domains[0].main: "{{ dns_domain }}"
          traefik.http.routers.borg_ui.tls.domains[0].sans: "*.{{ dns_domain }}"
          traefik.http.routers.borg_ui.tls.certresolver: "letsencrypt"
          traefik.http.routers.borg_ui.middlewares: "{{ omit if borg_ui_available_externally else 'blockExternal@file' }}"

- name: Stop Borg UI
  when: not borg_ui_enabled
  block:
    - name: Stop Borg UI
      community.docker.docker_container:
        name: "{{ borg_ui_container_name }}"
        state: absent
    - name: Remove Borg UI Network
      community.docker.docker_network:
        name: "{{ borg_ui_network_name }}"
        state: absent
